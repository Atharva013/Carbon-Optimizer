name: Validate PR

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate Lambda Python syntax
        run: python3 -m py_compile lambda-function/index.py && echo "✅ Python syntax OK"

      - name: Install cfn-lint
        run: pip install cfn-lint

      - name: Lint CloudFormation template
        run: cfn-lint cloudformation/sustainable-infrastructure.yaml && echo "✅ CloudFormation template valid"

      - name: Check shell script syntax
        run: |
          for script in scripts/*.sh; do
            bash -n "$script" && echo "✅ $script syntax OK"
          done
